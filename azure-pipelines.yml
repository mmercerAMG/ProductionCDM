trigger:
  branches:
    include:
      - '*-Main'
      - 'feature/*'
      - 'hotfix/*'

variables:
  devWorkspaceId:  '2696b15d-427e-437b-ba5a-ca8d4fb188dd'
  prodWorkspaceId: 'c05c8a73-79ee-4b7f-b798-831b5c260f1b'

stages:
- stage: Deploy
  jobs:
  - job: PowerBIDeployment
    pool:
      vmImage: 'windows-latest'
    steps:
    - powershell: |
        # Derive model name dynamically from the source branch
        # Main branches:   [ModelName]-Main
        # Feature/Hotfix:  feature/[ModelName]-Main/[BranchName]
        $fullBranch = "$(Build.SourceBranch)" -replace "^refs/heads/", ""

        if ($fullBranch -match "^(.+)-Main$") {
            $modelName         = $Matches[1]
            $isProd            = $true
            $targetWorkspaceId = "$(prodWorkspaceId)"
            $reportName        = $modelName
        } elseif ($fullBranch -match "^(feature|hotfix)/(.+)-Main/(.+)$") {
            $modelName         = $Matches[2]
            $isProd            = $false
            $targetWorkspaceId = "$(devWorkspaceId)"
            $reportName        = $fullBranch
        } else {
            # Fallback for unexpected branch shapes — deploy to Dev
            $modelName         = ($fullBranch -split "/")[-1]
            $isProd            = $false
            $targetWorkspaceId = "$(devWorkspaceId)"
            $reportName        = $fullBranch
        }

        $reportFolder = "$(Build.SourcesDirectory)\$modelName.Report"
        $modelFolder  = "$(Build.SourcesDirectory)\$modelName.SemanticModel"
        $pbixPath     = "$(Build.ArtifactStagingDirectory)\$modelName.pbix"
        $targetEnv    = if ($isProd) { "Prod" } else { "Dev" }

        Write-Host "##[section]Model: $modelName | Env: $targetEnv | Workspace: $targetWorkspaceId"
        Write-Host "Report folder: $reportFolder"
        Write-Host "Model folder:  $modelFolder"

        # Validate PBIP folders exist for this model
        if (-not (Test-Path $reportFolder)) {
            Write-Error "Report folder not found: $reportFolder`nEnsure the branch contains '$modelName.Report' and '$modelName.SemanticModel' folders."
            exit 1
        }

        # Compile PBIP -> PBIX using pbi-tools (bundled in repo under PBI-Tools/)
        $pbiToolsPath = "$(Build.SourcesDirectory)\PBI-Tools\pbi-tools.exe"
        if (-not (Test-Path $pbiToolsPath)) {
            Write-Error "pbi-tools.exe not found at $pbiToolsPath.`nAdd pbi-tools.exe to the Main\PBI-Tools\ folder in the repository."
            exit 1
        }
        Write-Host "Compiling PBIP to PBIX..."
        & $pbiToolsPath compile "$(Build.SourcesDirectory)" -outPath $pbixPath
        if ($LASTEXITCODE -ne 0) { Write-Error "pbi-tools compile failed (exit $LASTEXITCODE)"; exit 1 }
        Write-Host "Compiled: $pbixPath"

        # Authenticate via Service Principal (client credentials flow)
        Write-Host "Authenticating with Power BI..."
        $tokenResp = Invoke-RestMethod -Method POST `
            -Uri "https://login.microsoftonline.com/$(TenantId)/oauth2/v2.0/token" `
            -Body @{
                grant_type    = 'client_credentials'
                client_id     = "$(AppId)"
                client_secret = "$(clientSecret)"
                scope         = 'https://analysis.windows.net/powerbi/api/.default'
            }
        $tokenResp.access_token | Set-Content "$env:TEMP\pbi_token.txt" -NoNewline
        Write-Host "Token acquired."

        # Deploy using deploy-pbi.ps1
        Write-Host "Deploying '$modelName' to $targetEnv..."
        & "$(Build.SourcesDirectory)\deploy-pbi.ps1" `
            -TargetEnv        $targetEnv `
            -BranchName       $reportName `
            -PbixPath         $pbixPath `
            -ProdWorkspaceId  $targetWorkspaceId

        if ($LASTEXITCODE -ne 0) { Write-Error "Deployment failed"; exit 1 }
        Write-Host "##[section]Deployment of '$modelName' to $targetEnv complete."

      displayName: 'Compile and Deploy Power BI Model'
      env:
        TenantId:     $(tenantId)
        AppId:        $(appId)
        clientSecret: $(clientSecret)
